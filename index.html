<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encuentra tu vuelo</title>
<meta name="description" content="Busca y reserva vuelos.">

<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 720px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
    line-height: 1.5;
  }
  h1 { font-size: 1.6rem; margin-bottom: 0.25rem; }
  p.subtitle { color: #666; margin-top: 0; }
  #buscador {
    margin: 2rem 0;
    padding: 1.5rem;
    border: 1px solid #ddd;
    border-radius: 12px;
    text-align: center;
  }
  #buscador a.boton {
    display: inline-block;
    margin-top: 0.75rem;
    padding: 0.75rem 1.5rem;
    background: #1a73e8;
    color: #fff;
    border-radius: 8px;
    font-weight: 600;
  }
  #buscador a.boton:hover { background: #1558b0; text-decoration: none; }
  footer { margin-top: 3rem; font-size: 0.85rem; color: #888; }
</style>
</head>
<body>

<h1>Encuentra tu vuelo</h1>
<p class="subtitle">Busca y compara vuelos para tu próximo viaje.</p>

<div id="buscador">
  <p>Compara y reserva tu vuelo:</p>
  <a class="boton" href="https://vuelos.inteligenciaconia.com">Buscar vuelos →</a>
</div>

<footer>
  Este sitio puede recibir una comisión de las agencias de viaje enlazadas cuando reservas a través
  de los enlaces de esta página, sin coste adicional para ti.
</footer>

</body>
</html>
